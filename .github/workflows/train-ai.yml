name: 🧘‍♂️ Pertapaan AI (Self-Training)

on:
  workflow_dispatch: # Ini trik biar lu bisa klik tombol 'Run' manual dari HP

jobs:
  bertapa:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Ngambil kodingan lu
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: ⚙️ Setup Mesin Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Alat Pertukangan (Jalur Paksa)
        run: npm install @google/genai fs-extra

      - name: 🧠 Eksekusi AI buat Bertapa
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node train.js

      - name: 💾 Simpan Catatan (CLAUDE.md) ke Repo
        run: |
          git config --global user.name "Ghost Dev [AI]"
          git config --global user.email "ghost-dev@ai.bot"
          git add CLAUDE.md
          git commit -m "📝 AI nambahin aturan baru ke CLAUDE.md" || echo "Gak ada perubahan"
          git push https://${{ secrets.GH_AGENT_TOKEN }}@github.com/${{ github.repository }}.git main
