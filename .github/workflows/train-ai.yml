name: 👷‍♂️ Kuli AI (Build Portofolio)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Ngambil kodingan lu
        uses: actions/checkout@v4

      - name: ⚙️ Setup Mesin Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Alat Pertukangan
        run: npm install fs-extra

      - name: 🧠 Eksekusi AI buat Ngoding
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node build.js

      - name: 💾 Simpan Portofolio (index.html) ke Repo
        run: |
          git config --global user.name "Ghost Dev [AI]"
          git config --global user.email "ghost-dev@ai.bot"
          git add index.html
          git commit -m "🚀 AI nge-build pondasi portofolio R_hmt ofc" || echo "Gak ada perubahan"
          git push
