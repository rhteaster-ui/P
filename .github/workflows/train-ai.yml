import fs from 'fs-extra';

const apiKey = process.env.GEMINI_API_KEY;
const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

async function runTraining() {
  console.log("🧘‍♂️ Ghost Dev lagi meditasi tingkat tinggi...");

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: "Lu adalah Senior Auditor. Buat satu aturan koding singkat untuk file CLAUDE.md dalam format JSON: {\"action\": \"write_file\", \"file_path\": \"CLAUDE.md\", \"content\": \"Aturan: Wajib pake semicolon.\"} JANGAN KASIH TEKS LAIN." }] }]
      })
    });

    const data = await response.json();
    let rawText = data.candidates[0].content.parts[0].text.trim();
    
    // TRICK: Hapus bungkusan ```json atau ``` kalo AI-nya bandel
    rawText = rawText.replace(/```json|```/g, "").trim();

    const aiDecision = JSON.parse(rawText);
    
    if (aiDecision.action === "write_file") {
      // Pake path absolute biar gak nyasar
      fs.writeFileSync('./CLAUDE.md', aiDecision.content);
      console.log("✅ File CLAUDE.md BERHASIL DIBIKIN!");
    }
  } catch (error) {
    console.error("❌ Waduh, Gemini-nya lagi sariawan:", error.message);
  }
}
runTraining();
