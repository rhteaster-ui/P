name: 🧘‍♂️ Pertapaan AI (Self-Training)

on:
  workflow_dispatch:

jobs:
  bertapa:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 👈 INI KUNCI SAKTINYA BIAR GAK ERROR 403
    steps:
      - name: 📥 Ngambil kodingan lu
        uses: actions/checkout@v4

      - name: ⚙️ Setup Mesin Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Alat Pertukangan
        run: npm install fs-extra

      - name: 🧠 Eksekusi AI buat Bertapa
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node train.js

      - name: 💾 Simpan Catatan (CLAUDE.md) ke Repo
        run: |
          git config --global user.name "Ghost Dev [AI]"
          git config --global user.email "ghost-dev@ai.bot"
          git add CLAUDE.md
          git commit -m "📝 AI nambahin aturan baru ke CLAUDE.md hasil evaluasi" || echo "Gak ada perubahan"
          git push
